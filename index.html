  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0605; --accent-uv: #7c3aed; --accent-orange: #f97316;
      --text-primary: #f5f1e8; --text-muted: #888888;
      --grain: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.06"/></svg>');
    }
    html, body { height: 100%; margin: 0; background-color: var(--bg-dark); color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--grain); pointer-events: none; z-index: 9999; }
    
    .font-display { font-family: 'Syne', sans-serif; }
    .b-border { border: 1px solid var(--text-primary); }
    .b-border-b { border-bottom: 1px solid var(--text-primary); }
    .b-border-r { border-right: 1px solid var(--text-primary); }
    .b-border-t { border-top: 1px solid var(--text-primary); }
    .b-border-l { border-left: 3px solid var(--text-primary); }
    
    .marquee-container { overflow: hidden; white-space: nowrap; width: 100%; background-color: var(--accent-orange); color: var(--bg-dark); padding: 10px 0; border-bottom: 1px solid var(--text-primary); border-top: 1px solid var(--text-primary); }
    .marquee-content { display: inline-block; animation: marquee 15s linear infinite; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .btn-brutal { background: transparent; border: 1px solid var(--text-primary); color: var(--text-primary); padding: 12px 24px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: all 0.2s ease; cursor: pointer; }
    .btn-brutal:hover { background: var(--text-primary); color: var(--bg-dark); }
    .btn-uv:hover { background: var(--accent-uv); border-color: var(--accent-uv); color: var(--text-primary); }
    
    .brutal-input { background: transparent; border: none; border-bottom: 1px solid var(--text-primary); padding: 16px 0; color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 1px; font-size: 16px; transition: border-color 0.3s ease; width: 100%; }
    .brutal-input:focus { outline: none; border-bottom-color: var(--accent-uv); }
    .brutal-input::placeholder { color: var(--text-muted); }

    .editorial-grid { display: grid; grid-template-columns: 1fr; }
    @media (min-width: 768px) { .editorial-grid { grid-template-columns: 1fr 1fr; } }
    
    .img-wrapper:hover .img-vintage { filter: grayscale(0%) contrast(1.1) sepia(20%); }
    .img-vintage { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(1.2); transition: filter 0.3s ease; }
    
    .sparkle { position: fixed; pointer-events: none; animation: sparkleAnim 0.8s ease-out forwards; z-index: 9998; font-size: 1.2rem;}
    @keyframes sparkleAnim { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); } }

    /* Hide pages logic */
    .page-section { display: none; }
    .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Custom Logo Mapping */
    .jbn-logo-large {
      width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--accent-uv);
      background-image: url('./149160.jpg'); 
      background-size: cover; background-position: center; background-repeat: no-repeat;
      margin: 0 auto 32px; box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
    }
    .jbn-logo-small {
      width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-orange);
      background-image: url('./149160.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;
    }
    @media (min-width: 768px) { .jbn-logo-large { width: 300px; height: 300px; } }
  </style>
</head>
